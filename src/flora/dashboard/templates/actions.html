{% extends "base.html" %}
{% block content %}
<h1>Action Log</h1>
<div class="card">
<table>
<thead><tr><th>Time</th><th>Plant</th><th>Action</th><th>Model</th><th>Reasoning</th></tr></thead>
<tbody>
{% for a in actions %}
<tr>
    <td>{{ a.timestamp.strftime("%Y-%m-%d %H:%M") }}</td>
    <td>{{ a.plant_name or "—" }}</td>
    <td>{{ a.action_type }}</td>
    <td style="color: #888; font-size: 0.8rem;">{{ a.claude_model }}</td>
    <td>{{ a.reasoning }}</td>
</tr>
{% endfor %}
</tbody>
</table>
</div>
{% endblock %}
