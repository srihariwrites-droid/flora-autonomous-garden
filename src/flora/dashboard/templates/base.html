<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora — Autonomous Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script>if(localStorage.getItem('flora-theme')==='light')document.documentElement.classList.add('preload-light');</script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg:         #070E0A;
            --surface:    #0C1810;
            --surface2:   #111F15;
            --surface3:   #162818;
            --border:     rgba(0,220,100,0.07);
            --border-hi:  rgba(0,220,100,0.2);
            --glow:       rgba(0,220,100,0.12);
            --accent:     #00E07A;
            --accent-dim: #00803F;
            --amber:      #FFBA4A;
            --red:        #FF4D6A;
            --blue:       #4DC8FF;
            --text:       #C4E0C8;
            --text-muted: #4A7558;
            --text-dim:   #253C2C;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            font-size: 15px;
            line-height: 1.55;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,220,100,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,220,100,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* Ambient radial glow */
        .ambient {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
        }
        .ambient-1 {
            width: 600px; height: 600px;
            top: -200px; left: -150px;
            background: radial-gradient(ellipse, rgba(0,180,70,0.06) 0%, transparent 70%);
        }
        .ambient-2 {
            width: 400px; height: 400px;
            bottom: 10vh; right: -100px;
            background: radial-gradient(ellipse, rgba(0,150,60,0.04) 0%, transparent 70%);
        }

        /* NAV */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            height: 58px;
            background: rgba(7,14,10,0.88);
            backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.45rem;
            font-weight: 300;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
            margin-right: 3rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
        }

        .brand-pulse {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 0 var(--accent);
            animation: pulse-ring 2.4s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(0,224,122,0.7); }
            70%  { box-shadow: 0 0 0 8px rgba(0,224,122,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,224,122,0); }
        }

        nav a.nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 0 1.1rem;
            height: 58px;
            display: flex;
            align-items: center;
            position: relative;
            transition: color 0.2s;
            font-weight: 500;
        }

        nav a.nav-link::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 1.1rem;
            right: 1.1rem;
            height: 1px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.22s ease;
        }

        nav a.nav-link:hover { color: var(--text); }
        nav a.nav-link:hover::after { transform: scaleX(1); }
        nav a.nav-link.active { color: var(--accent); }
        nav a.nav-link.active::after { transform: scaleX(1); }

        .nav-spacer { flex: 1; }

        .nav-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            padding: 0.25rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        .nav-badge-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }

        /* CONTAINER */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2.5rem 2rem 4rem;
            position: relative;
            z-index: 1;
        }

        /* PAGE HEADER */
        .page-header {
            margin-bottom: 2.5rem;
            animation: fade-up 0.5s ease both;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.6rem;
            font-weight: 300;
            color: var(--text);
            letter-spacing: -0.01em;
            line-height: 1.1;
        }

        .page-title em { font-style: italic; color: var(--accent); }

        .page-eyebrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        /* CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,220,100,0.025) 0%, transparent 55%);
            pointer-events: none;
        }

        .card:hover {
            border-color: var(--border-hi);
            box-shadow: 0 0 40px var(--glow), inset 0 0 0 1px rgba(0,220,100,0.04);
        }

        .card-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 1.1rem;
        }

        /* GRID */
        .grid   { display: grid; gap: 1.25rem; }
        .grid-3 { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .grid-2 { grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); }

        /* STAT ROW */
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.55rem 0;
            border-bottom: 1px solid rgba(0,220,100,0.05);
        }
        .stat-row:last-child { border-bottom: none; }

        .stat-label {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            color: var(--text);
        }

        /* BADGES */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.18rem 0.6rem;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.63rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .badge::before {
            content: '';
            width: 4px; height: 4px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .badge-healthy { background: rgba(0,224,122,0.1); color: var(--accent); border: 1px solid rgba(0,224,122,0.18); }
        .badge-healthy::before { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        .badge-dry     { background: rgba(255,186,74,0.1); color: var(--amber); border: 1px solid rgba(255,186,74,0.18); }
        .badge-dry::before { background: var(--amber); }
        .badge-wet     { background: rgba(77,200,255,0.1); color: var(--blue); border: 1px solid rgba(77,200,255,0.18); }
        .badge-wet::before { background: var(--blue); }
        .badge-critical{ background: rgba(255,77,106,0.1); color: var(--red); border: 1px solid rgba(255,77,106,0.18); }
        .badge-critical::before { background: var(--red); animation: pulse-ring 1s ease-in-out infinite; }
        .badge-unknown { background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.07); }
        .badge-unknown::before { background: var(--text-dim); }

        /* BUTTON */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 1.3rem;
            border-radius: 7px;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.18s ease;
            line-height: 1;
        }

        .btn-primary {
            background: var(--accent);
            color: #060E08;
            box-shadow: 0 2px 16px rgba(0,224,122,0.3);
        }

        .btn-primary:hover {
            background: #00F585;
            box-shadow: 0 4px 28px rgba(0,224,122,0.5);
            transform: translateY(-1px);
        }

        .btn-primary:active { transform: translateY(0); }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover { border-color: var(--border-hi); color: var(--text); }

        /* INPUT */
        input[type="number"] {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            padding: 0.5rem 0.75rem;
            width: 5.5rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 2px rgba(0,224,122,0.08);
        }

        /* TABLE */
        .data-table { width: 100%; border-collapse: collapse; }

        .data-table th {
            text-align: left;
            padding: 0.55rem 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            font-weight: 400;
        }

        .data-table td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid rgba(0,220,100,0.04);
            color: var(--text-muted);
            font-size: 0.82rem;
            vertical-align: top;
        }

        .data-table tr:last-child td { border-bottom: none; }

        .data-table tr:hover td { background: rgba(0,220,100,0.018); }

        .mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
        }

        /* PLANT LINK */
        a.plant-link {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            color: var(--text);
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 400;
        }
        a.plant-link:hover { color: var(--accent); }

        /* ALERT */
        .alert {
            padding: 0.65rem 1rem;
            border-radius: 7px;
            font-size: 0.8rem;
        }
        .alert-success { background: rgba(0,224,122,0.08); border: 1px solid rgba(0,224,122,0.18); color: var(--accent); }
        .alert-error   { background: rgba(255,77,106,0.08); border: 1px solid rgba(255,77,106,0.18); color: var(--red); }
        .alert-info    { background: rgba(77,200,255,0.06); border: 1px solid rgba(77,200,255,0.14); color: var(--blue); }

        /* SECTION */
        .section { margin-top: 2.5rem; }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.35rem;
            font-weight: 300;
            color: var(--text);
            white-space: nowrap;
        }

        .section-rule {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* MOISTURE RING (SVG circle meter) */
        .moisture-ring { position: relative; display: inline-block; }
        .moisture-ring svg { transform: rotate(-90deg); }
        .moisture-ring .ring-bg { fill: none; stroke: var(--surface3); stroke-width: 4; }
        .moisture-ring .ring-fill {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1);
        }
        .moisture-ring .ring-label {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
        }
        .moisture-ring .ring-pct {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1;
        }
        .moisture-ring .ring-unit {
            font-size: 0.55rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            margin-top: 2px;
        }

        /* ANIMATIONS */
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .fade-up   { animation: fade-up 0.45s ease both; }
        .fade-up-1 { animation: fade-up 0.45s 0.06s ease both; }
        .fade-up-2 { animation: fade-up 0.45s 0.12s ease both; }
        .fade-up-3 { animation: fade-up 0.45s 0.18s ease both; }
        .fade-up-4 { animation: fade-up 0.45s 0.24s ease both; }
        .fade-up-5 { animation: fade-up 0.45s 0.30s ease both; }

        /* Apply light mode before paint (no flash) */
        html.preload-light body { --bg:#F5F7F5; --surface:#FFF; --surface2:#EDF2EE; --surface3:#E2EBE3; --border:rgba(0,120,50,0.1); --border-hi:rgba(0,160,70,0.3); --glow:rgba(0,160,70,0.08); --accent:#008844; --accent-dim:#005C2C; --text:#0E1E12; --text-muted:#3A6648; --text-dim:#7AA489; }

        /* LIGHT MODE */
        body.light-mode {
            --bg:         #F5F7F5;
            --surface:    #FFFFFF;
            --surface2:   #EDF2EE;
            --surface3:   #E2EBE3;
            --border:     rgba(0,120,50,0.1);
            --border-hi:  rgba(0,160,70,0.3);
            --glow:       rgba(0,160,70,0.08);
            --accent:     #008844;
            --accent-dim: #005C2C;
            --text:       #0E1E12;
            --text-muted: #3A6648;
            --text-dim:   #7AA489;
        }
        body.light-mode::before {
            background-image:
                linear-gradient(rgba(0,120,50,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,120,50,0.04) 1px, transparent 1px);
        }
        body.light-mode nav {
            background: rgba(245,247,245,0.92);
        }

        /* THEME TOGGLE BUTTON */
        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px; height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            color: var(--text-muted);
            margin-left: 0.75rem;
            transition: color 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }
        .theme-toggle:hover { color: var(--text); border-color: var(--border-hi); }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* TABLE SCROLL WRAPPER */
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table-scroll .data-table { min-width: 480px; }

        /* NAV LINKS WRAPPER — flex on desktop, collapsible on mobile */
        .nav-links {
            display: flex;
            align-items: stretch;
        }

        /* HAMBURGER BUTTON */
        .nav-hamburger {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 22px;
            height: 15px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            flex-shrink: 0;
            margin-left: 0.75rem;
        }
        .nav-hamburger span {
            display: block;
            width: 100%;
            height: 1.5px;
            background: var(--text-muted);
            border-radius: 2px;
            transition: background 0.2s;
        }
        .nav-hamburger:hover span { background: var(--text); }

        /* MOBILE RESPONSIVE */
        @media (max-width: 480px) {
            /* Hamburger visible, badge hidden */
            .nav-hamburger { display: flex; }
            .nav-badge { display: none; }

            /* Nav links collapse into a dropdown */
            .nav-links {
                display: none;
                position: absolute;
                top: 58px;
                left: 0;
                right: 0;
                background: rgba(7,14,10,0.97);
                backdrop-filter: blur(24px) saturate(180%);
                border-bottom: 1px solid var(--border);
                flex-direction: column;
                padding: 0.4rem 0;
                z-index: 99;
            }
            .nav-links.open { display: flex; }

            nav a.nav-link {
                height: auto;
                padding: 0.85rem 1.5rem;
                font-size: 0.78rem;
                border-bottom: 1px solid rgba(0,220,100,0.04);
            }
            nav a.nav-link::after { display: none; }
            nav a.nav-link.active { background: rgba(0,220,100,0.04); }
            nav a.nav-link:last-child { border-bottom: none; }

            /* Container padding */
            .container { padding: 1.25rem 1rem 3rem; }

            /* Typography */
            .page-title { font-size: 2rem; }

            /* Grids — force single column */
            .grid-2, .grid-3 { grid-template-columns: 1fr; }

            /* Hide less-important columns on mobile */
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>

    <nav>
        <a href="/" class="brand">
            <span class="brand-pulse"></span>
            Flora
        </a>
        <div class="nav-links" id="navLinks">
            <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Overview</a>
            <a href="/actions" class="nav-link {% if '/actions' in request.url.path %}active{% endif %}">Actions</a>
            <a href="/logs" class="nav-link {% if '/logs' in request.url.path %}active{% endif %}">Journal</a>
        </div>
        <div class="nav-spacer"></div>
        <div class="nav-badge">
            <span class="nav-badge-dot"></span>
            system online
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
            <svg id="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg id="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </nav>
    <script>
        (function() {
            var saved = localStorage.getItem('flora-theme');
            if (saved === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('icon-moon').style.display = 'none';
                document.getElementById('icon-sun').style.display = 'block';
            }
            document.getElementById('themeToggle').addEventListener('click', function() {
                var isLight = document.body.classList.toggle('light-mode');
                localStorage.setItem('flora-theme', isLight ? 'light' : 'dark');
                document.getElementById('icon-moon').style.display = isLight ? 'none' : 'block';
                document.getElementById('icon-sun').style.display = isLight ? 'block' : 'none';
            });
            document.getElementById('navHamburger').addEventListener('click', function() {
                var links = document.getElementById('navLinks');
                var open = links.classList.toggle('open');
                this.setAttribute('aria-expanded', open);
            });
        })();
    </script>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
